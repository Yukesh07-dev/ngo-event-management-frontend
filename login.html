<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NGO Connect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-heart-fill me-1"></i> NGO Connect
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto" id="navbarMenu"></ul>
        </div>
    </div>
</nav>

<div class="container auth-section">

    <div class="row justify-content-center align-items-center">

        <div class="col-lg-5 col-md-7">

            <div class="form-card">
                <div class="text-center mb-4">
                    <div class="auth-icon mx-auto mb-3">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <h2 class="auth-card-title mb-2">Welcome Back</h2>
                    <p class="text-muted">Sign in to continue making a difference</p>
                </div>

                <form id="loginForm" novalidate>

                    <div class="mb-4">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="position-relative">
                            <input
                                type="email"
                                id="email"
                                class="form-control ps-5"
                                placeholder="Enter your email"
                                required maxlength="100">
                            <i class="bi bi-envelope position-absolute top-50 start-0 translate-middle-y ms-3 text-success"></i>
                            <div class="invalid-feedback">Please enter a valid email address</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="position-relative">
                            <input
                                type="password"
                                id="password"
                                class="form-control ps-5"
                                placeholder="Enter your password"
                                required minlength="6" maxlength="100">
                            <i class="bi bi-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-success"></i>
                            <div class="invalid-feedback">Password must be at least 6 characters</div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-success text-decoration-none fw-600">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg w-100 mb-3" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>

                    <div class="text-center">
                        <span class="text-muted">Don't have an account?</span>
                        <a href="register.html" class="text-success text-decoration-none fw-600 ms-1">Register</a>
                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/site-config.js"></script>
<script src="js/site.js"></script>
<script src="js/navbar.js"></script>
<script src="js/login.js"></script>

</body>
</html>
