<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="bi bi-heart-fill me-1"></i> NGO Connect
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto" id="navbarMenu"></ul>
        </div>
    </div>
</nav>

<div class="container content-section">

    <div class="form-card">

        <h2 class="mb-4">
            My Profile
        </h2>

        <form id="profileForm">

            <input
                type="text"
                id="fullName"
                class="form-control mb-3"
                placeholder="Full Name">

            <input
                type="email"
                id="email"
                class="form-control mb-3"
                readonly>

            <input
                type="text"
                id="phone"
                class="form-control mb-3"
                placeholder="Phone">

            <textarea
                id="address"
                class="form-control mb-3"
                placeholder="Address"></textarea>

            <button
                type="submit"
                class="btn btn-success btn-lg">
                <i class="bi bi-check2-circle me-2"></i>Update Profile
            </button>

        </form>

        <div id="message" class="mt-3"></div>

    </div>

</div>

<footer class="bg-dark text-white py-5">
    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-4">
                <h5 class="fw-bold"><i class="bi bi-heart-fill me-1"></i> NGO Connect</h5>
                <p class="text-white-50 site-tagline"></p>
            </div>
            <div class="col-md-4 mb-4">
                <h5>Quick Links</h5>
                <ul class="list-unstyled">
                    <li><a href="events.html" class="text-white-50 text-decoration-none">Events</a></li>
                    <li><a href="volunteer.html" class="text-white-50 text-decoration-none">Volunteer</a></li>
                    <li><a href="donate.html" class="text-white-50 text-decoration-none">Donate</a></li>
                    <li><a href="contact.html" class="text-white-50 text-decoration-none">Contact Us</a></li>
                </ul>
            </div>
            <div class="col-md-4 mb-4">
                <h5>Contact</h5>
                                <p class="text-white-50 mb-1"><i class="bi bi-envelope me-2"></i><a href="#" class="site-email text-white-50 text-decoration-none"></a></p>
                <p class="text-white-50 mb-1"><i class="bi bi-telephone me-2"></i><a href="#" class="site-phone-link text-white-50 text-decoration-none"></a></p>
                <p class="text-white-50 mb-0"><i class="bi bi-geo-alt me-2"></i><span class="site-address"></span></p>
            </div>
        </div>
        <hr class="border-secondary">
        <p class="text-center text-white-50 mb-0">NGO Connect &copy; 2026. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/site-config.js"></script>
<script src="js/site.js"></script>
<script src="js/navbar.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
